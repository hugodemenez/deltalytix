name: Sync upstream

on:
  schedule:
    # Check for upstream changes daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout fork with PAT
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hugodemenez/deltalytix.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          UPSTREAM="upstream/main"
          LOCAL="origin/main"
          LOCAL_SHA=$(git rev-parse "$LOCAL")
          UPSTREAM_SHA=$(git rev-parse "$UPSTREAM")

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "No new upstream commits (both at $LOCAL_SHA)"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream has new commits ($UPSTREAM_SHA vs local $LOCAL_SHA)"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and PR
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          BRANCH="sync/upstream-$(date -u +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit
          # Remove files we don't want in the fork
          for f in code-review.yml generate-changelog.yml; do
            if [ -f ".github/workflows/$f" ]; then
              git rm ".github/workflows/$f"
            fi
          done
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi
          git push origin "$BRANCH"

          PR_BODY="Automated sync from upstream \`hugodemenez/deltalytix\` branch \`beta\`.

          Review the changes before merging. Resolve any conflicts manually if the merge did not complete cleanly."

          gh pr create \
            --title "Sync upstream ($(date -u +%Y-%m-%d))" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH"
