name: Generate Changelog

on:
  pull_request:
    types: [opened, reopened]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Beta → main PR number to generate changelog for'
        required: true
        type: string

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.ref == 'beta' && github.event.pull_request.base.ref == 'main')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            PR_JSON=$(gh pr view "$PR_NUMBER" --json number,baseRefName,headRefName,baseRefOid,headRefOid,url)
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_JSON=$(gh pr view "$PR_NUMBER" --json number,baseRefName,headRefName,baseRefOid,headRefOid,url)
          fi

          BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')
          BASE_SHA=$(echo "$PR_JSON" | jq -r '.baseRefOid')
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')
          PR_URL=$(echo "$PR_JSON" | jq -r '.url')

          if [ "$BASE_REF" != "main" ] || [ "$HEAD_REF" != "beta" ]; then
            echo "::error::PR #$PR_NUMBER is not a beta → main promotion (got $HEAD_REF → $BASE_REF)"
            exit 1
          fi

          {
            echo "number=$PR_NUMBER"
            echo "base_ref=$BASE_REF"
            echo "head_ref=$HEAD_REF"
            echo "base_sha=$BASE_SHA"
            echo "head_sha=$HEAD_SHA"
            echo "url=$PR_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Generate changelog entries
        env:
          GH_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          set -euo pipefail

          BRANCH_NAME="changelog/pr-${PR_NUMBER}"

          if git ls-remote --exit-code origin "refs/heads/${BRANCH_NAME}" >/dev/null 2>&1; then
            echo "Changelog branch ${BRANCH_NAME} already exists. Skipping generation."
            exit 0
          fi

          if gh pr list --head "$BRANCH_NAME" --base "$HEAD_REF" --state open --json number --jq '.[0].number' | grep -q .; then
            echo "An open changelog PR already exists for PR #${PR_NUMBER}. Skipping generation."
            exit 0
          fi

          git checkout -b "$BRANCH_NAME"

          FIRST_COMMIT_DATE=$(git log --format=%ai -1 "$BASE_SHA" | cut -d' ' -f1)
          LAST_COMMIT_DATE=$(git log --format=%ai -1 "$HEAD_SHA" | cut -d' ' -f1)

          agent -p --force --trust \
            "Analyze the changes in this pull request from beta to main. 
            
            Create changelog entries following the Deltalytix format:
            
            **File Structure:**
            - Create files in both \`content/updates/en\` and \`content/updates/fr\`
            - Filename: kebab-case-title.mdx (descriptive, lowercase with hyphens)
            
            **Frontmatter:**
            ---
            title: 'Human-readable title'
            description: 'Short description'
            date: '$FIRST_COMMIT_DATE'
            status: completed
            completedDate: '$LAST_COMMIT_DATE'
            ---
            
            **Content Guidelines:**
            - 2-4 short paragraphs; add headings or bullets only if it helps
            - Examine recent changelogs in content/updates/en/ to understand format
            - Simple language: Avoid jargon, be conversational
            - Human tone: Informal, not corporate-sounding
            - Avoid the word 'programmatically'
            - Focus on user-facing product changes; skip infra-only changes
            - Start with what was added/changed
            - Explain the benefit or use case
            - Call out specific UX/UI surfaces and behaviors
            
            Generate changelog entries for all significant user-facing changes in this PR. 
            Create separate entries for distinct features/changes. 
            Write in both English and French (create files in both directories).
            
            Only create changelog files - do not modify any other files." --model auto

          if [ -z "$(git status --porcelain content/updates/)" ]; then
            echo "No changelog entries generated. Exiting."
            exit 0
          fi

          git add content/updates/
          git commit -m "docs: add changelog entries for PR #${PR_NUMBER}"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "📝 Changelog entries for PR #${PR_NUMBER}" \
            --body "This PR contains changelog entries generated for [PR #${PR_NUMBER}](${PR_URL}).
            
            ## Generated by
            - Workflow: ${{ github.workflow }}
            - Run: ${{ github.run_id }}
            - Event: ${{ github.event_name }}
            - Base: ${BASE_REF}
            - Head: ${HEAD_REF}
            
            ## Next Steps
            Review the changelog entries and merge this PR along with the main PR." \
            --base "${HEAD_REF}" \
            --head "$BRANCH_NAME"
