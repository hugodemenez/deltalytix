name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Setup Vercel project and deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Vercel project if it does not exist
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if ! bunx vercel project ls --token "$VERCEL_TOKEN" 2>/dev/null | grep -q "$VERCEL_PROJECT_NAME"; then
            echo "Creating Vercel project: $VERCEL_PROJECT_NAME"
            bunx vercel project add "$VERCEL_PROJECT_NAME" --token "$VERCEL_TOKEN"
          else
            echo "Vercel project already exists: $VERCEL_PROJECT_NAME"
          fi

      - name: Link project and capture project ID
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          bunx vercel link --project "$VERCEL_PROJECT_NAME" --yes --token "$VERCEL_TOKEN"
          # Extract project ID from .vercel/project.json
          PROJECT_ID=$(node -p "require('./.vercel/project.json').projectId")
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Set Vercel env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          set_env() {
            echo "$2" | bunx vercel env add "$1" production --token "$VERCEL_TOKEN" 2>/dev/null || true
          }
          set_env DATABASE_URL "$DATABASE_URL"
          set_env DIRECT_URL "$DIRECT_URL"
          set_env NEXT_PUBLIC_SUPABASE_URL "$NEXT_PUBLIC_SUPABASE_URL"
          set_env NEXT_PUBLIC_SUPABASE_ANON_KEY "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          set_env SUPABASE_SERVICE_KEY "$SUPABASE_SERVICE_KEY"
          set_env ENCRYPTION_KEY "$ENCRYPTION_KEY"
          set_env NEXT_PUBLIC_SITE_URL "https://deltalytix-one.vercel.app"
          set_env OPENAI_API_KEY "dummy"
          set_env RESEND_API_KEY "dummy"
          set_env STRIPE_SECRET_KEY "dummy"

      - name: Pull env
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
        run: |
          bunx vercel pull --yes --token "$VERCEL_TOKEN"

      - name: Push Prisma schema to Supabase
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: bunx prisma db push --accept-data-loss

      - name: Generate Prisma client
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: bunx prisma generate

      - name: Build with Vercel CLI
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: dummy
          RESEND_API_KEY: dummy
          STRIPE_SECRET_KEY: dummy
        run: bunx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
        run: bunx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"