name: Cursor CLI Automation

on:
  # Run on pull requests
  pull_request:
    types: [opened, synchronize, reopened]
  # Run on push to main branch
  push:
    branches:
      - beta
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to perform'
        required: true
        default: 'code-review'
        type: choice
        options:
          - code-review
          - update-docs

jobs:
  cursor-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for better context
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Verify Cursor CLI installation
        run: |
          agent --version || echo "Agent command not found, checking path..."
          which agent || echo "Agent not in PATH yet"

      - name: Generate PR diff file
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          DIFF_FILE="$GITHUB_WORKSPACE/pr.diff"
          DIFF_STAT_FILE="$GITHUB_WORKSPACE/pr.diff.stat"

          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            git diff --stat HEAD^1...HEAD^2 > "$DIFF_STAT_FILE"
            git diff --find-renames HEAD^1...HEAD^2 > "$DIFF_FILE"
          else
            git fetch --no-tags origin \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}"
            git diff --stat "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > "$DIFF_STAT_FILE"
            git diff --find-renames "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > "$DIFF_FILE"
          fi

          if [ ! -s "$DIFF_FILE" ]; then
            echo "No PR diff was generated at $DIFF_FILE"
            exit 1
          fi

          echo "PR_DIFF_FILE=$DIFF_FILE" >> "$GITHUB_ENV"
          echo "PR_DIFF_STAT_FILE=$DIFF_STAT_FILE" >> "$GITHUB_ENV"

          echo "## PR Diff Stat" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat "$DIFF_STAT_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Code Review (on PR)
        if: github.event_name == 'pull_request'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          agent -p --model auto --trust --output-format text \
            "Review the changes in this pull request using the diff file at: $PR_DIFF_FILE

            Read that diff file directly and base the review on it. Focus on:
            - Code quality and best practices
            - Potential bugs or security issues
            - TypeScript/React best practices
            - Performance considerations
            - Missing error handling
            
            Provide a concise review summary. If there are critical issues, mention them clearly." \
            > code-review.txt
          
          echo "## Code Review Results" >> $GITHUB_STEP_SUMMARY
          cat code-review.txt >> $GITHUB_STEP_SUMMARY
          
          # Post review as PR comment
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 Automated Code Review
            
            $(cat code-review.txt)
            
            ---
            *Generated by Cursor CLI workflow*"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursor-results
          path: |
            code-review.txt
            pr.diff
            pr.diff.stat
          retention-days: 7
