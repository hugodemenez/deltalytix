name: Cursor CLI Automation

on:
  # Run on pull requests
  pull_request:
    types: [opened, synchronize, reopened]
  # Run on push to main branch
  push:
    branches:
      - beta
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to perform'
        required: true
        default: 'code-review'
        type: choice
        options:
          - code-review
          - update-docs

# Serialize runs per PR/branch so two reviews can't race and both post a
# fresh comment; the latest push supersedes any in-flight review.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cursor-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for better context
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Verify Cursor CLI installation
        run: |
          agent --version || echo "Agent command not found, checking path..."
          which agent || echo "Agent not in PATH yet"

      - name: Generate PR diff file
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          DIFF_FILE="$GITHUB_WORKSPACE/pr.diff"
          DIFF_STAT_FILE="$GITHUB_WORKSPACE/pr.diff.stat"

          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            git diff --stat HEAD^1...HEAD^2 > "$DIFF_STAT_FILE"
            git diff --find-renames HEAD^1...HEAD^2 > "$DIFF_FILE"
          else
            git fetch --no-tags origin \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}"
            git diff --stat "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > "$DIFF_STAT_FILE"
            git diff --find-renames "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > "$DIFF_FILE"
          fi

          if [ ! -s "$DIFF_FILE" ]; then
            echo "No PR diff was generated at $DIFF_FILE"
            exit 1
          fi

          echo "PR_DIFF_FILE=$DIFF_FILE" >> "$GITHUB_ENV"
          echo "PR_DIFF_STAT_FILE=$DIFF_STAT_FILE" >> "$GITHUB_ENV"

          echo "## PR Diff Stat" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat "$DIFF_STAT_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Check review limit
        if: github.event_name == 'pull_request'
        id: check-limit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Count completed (non-cancelled) runs of this workflow on the PR
          # branch. The current run is still in progress so it isn't counted.
          COMPLETED=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/code-review.yml/runs?event=pull_request&branch=${{ github.head_ref }}&per_page=100" \
            --jq '[.workflow_runs[] | select(.conclusion != null and .conclusion != "cancelled")] | length')
          echo "Completed reviews on this PR branch: $COMPLETED / 3"
          echo "completed=$COMPLETED" >> "$GITHUB_OUTPUT"
          if [ "$COMPLETED" -ge 3 ]; then
            echo "::notice::Review limit (3) reached for this PR; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Code Review (on PR)
        if: github.event_name == 'pull_request' && steps.check-limit.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          agent -p --model auto --trust --output-format text \
            "Review the changes in this pull request using the diff file at: $PR_DIFF_FILE

            Read that diff file directly and base the review on it. Focus on:
            - Code quality and best practices
            - Potential bugs or security issues
            - TypeScript/React best practices
            - Performance considerations
            - Missing error handling

            Provide a concise review summary. If there are critical issues, mention them clearly." \
            > code-review.txt

          # Bail out clearly if the agent produced no usable review
          if [ ! -s code-review.txt ]; then
            echo "::error::Code review produced no output; nothing to post"
            exit 1
          fi

          echo "## Code Review Results" >> $GITHUB_STEP_SUMMARY
          cat code-review.txt >> $GITHUB_STEP_SUMMARY

          # Hidden marker lets us find and update this comment on later commits
          MARKER="<!-- cursor-code-review -->"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          COMMIT_MSG=$(git log -1 --format="%s" "$HEAD_SHA")

          # Build the comment body
          {
            echo "$MARKER"
            echo "## 🤖 Automated Code Review"
            echo ""
            cat code-review.txt
            echo ""
            echo "---"
            COMPLETED=${{ steps.check-limit.outputs.completed }}
            REMAINING=$((3 - COMPLETED - 1))
            echo "*Generated by Cursor CLI workflow — \`${HEAD_SHA}\` ${COMMIT_MSG} · ${REMAINING} review(s) remaining*"
          } > comment-body.md

          # Delete any previous marker comments so the new one always
          # triggers a fresh notification and no stale review lingers.
          if ALL_IDS=$(gh api \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq ".[] | select(.body | contains(\"$MARKER\")) | .id"); then
            while IFS= read -r cid; do
              [ -n "$cid" ] || continue
              echo "Deleting previous review comment #$cid"
              gh api --method DELETE \
                "repos/${{ github.repository }}/issues/comments/${cid}" \
                || echo "::warning::Failed to delete comment #$cid"
            done <<< "$ALL_IDS"
          else
            echo "::warning::Failed to query existing comments; skipping deletion"
          fi

          gh pr comment "$PR_NUMBER" --body-file comment-body.md

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursor-results
          path: |
            code-review.txt
            pr.diff
            pr.diff.stat
          retention-days: 7
