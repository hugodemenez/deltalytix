version: '3.8'

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CLOUDFLARE_API_KEY=${CLOUDFLARE_API_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      # Tailscale auth key for secure remote access
      - TS_AUTHKEY=tskey-auth-kYMnnUDS2H11CNTRL-JTjP1uPjesLaXd5NfEPDsLpRcKT5ieoDg
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic.yml:/dynamic.yml:ro
      - ./traefik/letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=default-headers@file"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy

  # Single PostgreSQL Instance for All Applications
  postgres:
    image: postgres:14
    container_name: postgres-main
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - database-network

  # Trading Cycles Management Tool
  calendar:
    build:
      context: ./calendar-python
      dockerfile: Dockerfile
    container_name: trading-cycles
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${CYCLES_DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - BEARER_TOKEN=${BEARER_TOKEN}
    volumes:
      - ./calendar-python:/app
      - calendar_data:/app/data
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trading-cycles.rule=Host(`calendar.${DOMAIN}`)"
      - "traefik.http.routers.trading-cycles.entrypoints=websecure"
      - "traefik.http.routers.trading-cycles.tls.certresolver=cloudflare"
      - "traefik.http.routers.trading-cycles.middlewares=default-headers@file"
      - "traefik.http.services.trading-cycles.loadbalancer.server.port=12000"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy
      - database-network

  # FastX Application
  fastx:
    build:
      context: ./fastx
      dockerfile: Dockerfile
    container_name: fastx
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${FASTX_DB_NAME}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./fastx:/app
      - fastx_data:/app/data
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastx.rule=Host(`fastx.${DOMAIN}`)"
      - "traefik.http.routers.fastx.entrypoints=websecure"
      - "traefik.http.routers.fastx.tls.certresolver=cloudflare"
      - "traefik.http.routers.fastx.middlewares=default-headers@file"
      - "traefik.http.services.fastx.loadbalancer.server.port=8000"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy
      - database-network

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=your_secure_n8n_web_password
      - WEBHOOK_URL=https://n8n.${DOMAIN}
      - N8N_SKIP_CREDENTIAL_TEST="true"
      - GENERIC_TIMEZONE=${TZ}
      - DB_MIGRATIONS_RUN=true
      - N8N_TRUST_PROXY=true
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=cloudflare"
      - "traefik.http.routers.n8n.middlewares=default-headers@file"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy
      - database-network

  # Redis for SearXNG
  redis:
    image: valkey/valkey:8-alpine
    container_name: redis-searxng
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - searxng-network

  # SearXNG Search Engine
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=https://search.${DOMAIN}/
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
    volumes:
      - ./searxng:/etc/searxng:rw
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng.rule=Host(`search.${DOMAIN}`)"
      - "traefik.http.routers.searxng.entrypoints=websecure"
      - "traefik.http.routers.searxng.tls.certresolver=cloudflare"
      - "traefik.http.routers.searxng.middlewares=default-headers@file"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy
      - searxng-network

  # Open WebUI
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=your_openai_api_key_here
      - WEBUI_AUTH=true
    volumes:
      - open_webui_data:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - "traefik.http.routers.open-webui.entrypoints=websecure"
      - "traefik.http.routers.open-webui.tls.certresolver=cloudflare"
      - "traefik.http.routers.open-webui.middlewares=default-headers@file"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    environment:
      - WAHA_HTTPS_ENABLED=false
      - WAHA_API_KEY=6f83fdbb94bf4855bb2830a8c54d35c1
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=577dc65e779c4b4db265424e20babe33
      - WHATSAPP_SWAGGER_USERNAME=admin
      - WHATSAPP_SWAGGER_PASSWORD=577dc65e779c4b4db265424e20babe33
    volumes:
      - waha_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.waha.rule=Host(`waha.${DOMAIN}`)"
      - "traefik.http.routers.waha.entrypoints=websecure"
      - "traefik.http.routers.waha.tls.certresolver=cloudflare"
      - "traefik.http.routers.waha.middlewares=default-headers@file"
      - "traefik.http.services.waha.loadbalancer.server.port=3000"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy

  # Memos (notes)
  memos:
    image: neosmemo/memos:stable
    container_name: memos
    restart: unless-stopped
    volumes:
      - memos_data:/var/opt/memos
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.memos.rule=Host(`memos.${DOMAIN}`)"
      - "traefik.http.routers.memos.entrypoints=websecure"
      - "traefik.http.routers.memos.tls.certresolver=cloudflare"
      - "traefik.http.routers.memos.middlewares=default-headers@file"
      - "traefik.http.services.memos.loadbalancer.server.port=5230"
      - "traefik.docker.network=docker-services_proxy"
      - "traefik.http.routers.memos.tls=true"   
    networks:
      - proxy

  # Deltalytix Trading Platform
  deltalytix:
    build:
      context: ./deltalytix
      dockerfile: Dockerfile.bun
    container_name: deltalytix
    working_dir: /app
    restart: unless-stopped
    environment:
      ENV: container
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DELTALYTIX_DB_NAME}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DELTALYTIX_DB_NAME}
      OPENAI_API_KEY: ${DELTALYTIX_OPENAI_API_KEY}
      OPENAI_BASE_URL: ${DELTALYTIX_OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      DISCORD_SECRET: ${DELTALYTIX_DISCORD_SECRET}
      DISCORD_ID: ${DELTALYTIX_DISCORD_ID}
      REDIRECT_URL: ${DELTALYTIX_REDIRECT_URL}
      ENCRYPTION_KEY: ${DELTALYTIX_ENCRYPTION_KEY}
      RESEND_API_KEY: ${DELTALYTIX_RESEND_API_KEY}
      GITHUB_TOKEN: ${DELTALYTIX_GITHUB_TOKEN}
      NEXT_PUBLIC_DISCORD_INVITATION: ${NEXT_PUBLIC_DISCORD_INVITATION}
      NEXT_PUBLIC_REPO_OWNER: ${NEXT_PUBLIC_REPO_OWNER}
      NEXT_PUBLIC_REPO_NAME: ${NEXT_PUBLIC_REPO_NAME}
      SUPPORT_TEAM_EMAIL: ${DELTALYTIX_SUPPORT_TEAM_EMAIL}
      SUPPORT_EMAIL: ${DELTALYTIX_SUPPORT_EMAIL}
      STRIPE_SECRET_KEY: ${DELTALYTIX_STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${DELTALYTIX_STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      DELTALYTIX_OANDA_API_KEY: ${DELTALYTIX_OANDA_API_KEY}
      DELTALYTIX_OANDA_ACCOUNT_ID: ${DELTALYTIX_OANDA_ACCOUNT_ID}
      DELTALYTIX_OANDA_ENVIRONMENT: ${DELTALYTIX_OANDA_ENVIRONMENT}
      DELTALYTIX_OANDA_WEBHOOK_SECRET: ${DELTALYTIX_OANDA_WEBHOOK_SECRET}
      DELTALYTIX_PEPPERSTONE_ACCOUNT_ID: ${DELTALYTIX_PEPPERSTONE_ACCOUNT_ID}
      DELTALYTIX_PEPPERSTONE_PASSWORD: ${DELTALYTIX_PEPPERSTONE_PASSWORD}
    volumes:
      - ./deltalytix:/app
      - deltalytix_data:/app/.next
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deltalytix.rule=Host(`journal.${DOMAIN}`)"
      - "traefik.http.routers.deltalytix.entrypoints=websecure"
      - "traefik.http.routers.deltalytix.tls.certresolver=cloudflare"
      - "traefik.http.routers.deltalytix.middlewares=default-headers@file"
      - "traefik.http.services.deltalytix.loadbalancer.server.port=3000"
      - "traefik.docker.network=docker-services_proxy"
    networks:
      - proxy
      - database-network

networks:
  proxy:
    external: false
  database-network:
    external: false
  searxng-network:
    external: false

volumes:
  postgres_data:
  n8n_data:
  redis_data:
  open_webui_data:
  calendar_data:
  fastx_data:
  waha_data:
  memos_data:
  deltalytix_data: