services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-deltalytix_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - deltalytix-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devuser} -d ${POSTGRES_DB:-deltalytix_dev}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Self-host schema bootstrap (prisma db push). Not a versioned migration runner.
  schema-push:
    image: oven/bun:1
    working_dir: /app
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devuser}:${POSTGRES_PASSWORD:-devpass}@db:5432/${POSTGRES_DB:-deltalytix_dev}
      DIRECT_URL: postgresql://${POSTGRES_USER:-devuser}:${POSTGRES_PASSWORD:-devpass}@db:5432/${POSTGRES_DB:-deltalytix_dev}
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "bunx prisma db push"

  app:
    build:
      context: .
      dockerfile: Dockerfile.bun
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-devuser}:${POSTGRES_PASSWORD:-devpass}@db:5432/${POSTGRES_DB:-deltalytix_dev}
        DIRECT_URL: postgresql://${POSTGRES_USER:-devuser}:${POSTGRES_PASSWORD:-devpass}@db:5432/${POSTGRES_DB:-deltalytix_dev}
        OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
        RESEND_API_KEY: ${RESEND_API_KEY:-re_dummy}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://dummy.supabase.co}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-dummy}
        SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-dummy}
        ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
        STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_LOCAL_DASHBOARD_AUTH_BYPASS: ${NEXT_PUBLIC_LOCAL_DASHBOARD_AUTH_BYPASS:-false}
        NEXT_PUBLIC_LOCAL_DASHBOARD_USER_ID: ${NEXT_PUBLIC_LOCAL_DASHBOARD_USER_ID:-local-dashboard-user}
        NEXT_PUBLIC_LOCAL_DASHBOARD_USER_EMAIL: ${NEXT_PUBLIC_LOCAL_DASHBOARD_USER_EMAIL:-local-dashboard@deltalytix.local}
    working_dir: /app
    restart: unless-stopped
    environment:
      ENV: container
      DATABASE_URL: postgresql://${POSTGRES_USER:-devuser}:${POSTGRES_PASSWORD:-devpass}@db:5432/${POSTGRES_DB:-deltalytix_dev}
      DIRECT_URL: postgresql://${POSTGRES_USER:-devuser}:${POSTGRES_PASSWORD:-devpass}@db:5432/${POSTGRES_DB:-deltalytix_dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_dummy}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://dummy.supabase.co}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-dummy}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-dummy}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      LOCAL_DASHBOARD_AUTH_BYPASS_ALLOW_PRODUCTION: ${LOCAL_DASHBOARD_AUTH_BYPASS_ALLOW_PRODUCTION:-false}
      # Local dashboard auth bypass (opt-in; defaults to disabled for safety)
      LOCAL_DASHBOARD_AUTH_BYPASS: ${LOCAL_DASHBOARD_AUTH_BYPASS:-false}
      NEXT_PUBLIC_LOCAL_DASHBOARD_AUTH_BYPASS: ${NEXT_PUBLIC_LOCAL_DASHBOARD_AUTH_BYPASS:-false}
      LOCAL_DASHBOARD_USER_ID: ${LOCAL_DASHBOARD_USER_ID:-local-dashboard-user}
      NEXT_PUBLIC_LOCAL_DASHBOARD_USER_ID: ${NEXT_PUBLIC_LOCAL_DASHBOARD_USER_ID:-local-dashboard-user}
      LOCAL_DASHBOARD_USER_EMAIL: ${LOCAL_DASHBOARD_USER_EMAIL:-local-dashboard@deltalytix.local}
      NEXT_PUBLIC_LOCAL_DASHBOARD_USER_EMAIL: ${NEXT_PUBLIC_LOCAL_DASHBOARD_USER_EMAIL:-local-dashboard@deltalytix.local}
    depends_on:
      db:
        condition: service_healthy
      schema-push:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"

volumes:
  deltalytix-postgres:
